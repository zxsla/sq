<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>闪灵</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    body {
        margin: 0; padding: 0; font-family: system-ui, sans-serif;
        background: linear-gradient(135deg, #1e3a8a, #3b82f6, #60a5fa) fixed;
        color: #fff;
        min-height: 100vh;
        overflow-x: hidden;
        padding-bottom: 90px;
    }
    .snowflake {
        position: fixed; top: -20px; color: #fff; pointer-events: none; z-index: 1;
        animation: fall linear infinite; text-shadow: 0 0 10px #fff;
    }
    @keyframes fall { to { transform: translateY(120vh) rotate(360deg); } }

    header { text-align: center; padding: 30px 10px 20px; position: relative; }
    .title {
        font-size: 2.8rem; font-weight: bold; letter-spacing: 8px;
        background: linear-gradient(90deg, #c026d3, #a855f7, #e0bbff);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .marquee { margin: 12px 0; font-size: 1.2rem; white-space: nowrap; overflow: hidden; }
    .marquee span {
        display: inline-block; padding-left: 100%; animation: marquee 28s linear infinite;
        background: linear-gradient(90deg, #c026d3, #a855f7, #e0bbff);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }

    .controls { position: absolute; top: 25px; right: 15px; z-index: 20; }
    .btn {
        width: 46px; height: 46px; border: none; border-radius: 50%;
        background: rgba(255,255,255,0.3); color: white; font-size: 1.5rem;
    }

    .top-btns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin: 20px 12px;
    }
    .top-btn {
        padding: 16px;
        border: none;
        border-radius: 20px;
        background: rgba(255,255,255,0.25);
        color: white;
        font-size: 1.05rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .time { font-size: 1.12rem; margin: 10px 0; text-align: center; }

    /* 书签双列 - 这是重点 */
    .bookmarks {
        display: grid;
        grid-template-columns: 1fr 1fr;   /* 强制双列并排 */
        gap: 14px;
        padding: 0 12px;
    }
    .card {
        background: rgba(255,255,255,0.2);
        border-radius: 16px;
        padding: 14px;
        text-align: center;
        position: relative;
    }
    .card:hover { background: rgba(255,255,255,0.35); transform: scale(1.04); }
    .icon {
        width: 62px; height: 62px; border-radius: 14px; margin: 0 auto 10px;
        background: #fff; background-size: cover; background-position: center;
    }
    .name {
        font-size: 0.95rem; word-break: break-all;
        background: linear-gradient(90deg, #c026d3, #a855f7);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .actions {
        position: absolute; top: 8px; right: 8px; display: none; gap: 5px;
    }
    .card:hover .actions { display: flex; }
    .actions button {
        width: 26px; height: 26px; border: none; border-radius: 50%;
        font-size: 14px; background: rgba(0,0,0,0.75); color: white;
    }

    .footer {
        position: fixed; bottom: 0; left: 0; right: 0; text-align: center;
        padding: 16px; background: rgba(0,0,0,0.4); font-size: 0.9rem; z-index: 20;
    }
    audio { display: none; }
</style>
</head>
<body>

<script>
// 雪花
for(let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'snowflake';
  s.textContent = '❄';
  s.style.left = Math.random()*100 + '%';
  s.style.fontSize = (12 + Math.random()*20) + 'px';
  s.style.animationDuration = (8 + Math.random()*14) + 's';
  s.style.animationDelay = '-' + Math.random()*20 + 's';
  document.body.appendChild(s);
}
</script>

<header>
    <div class="controls">
        <button class="btn" id="musicBtn" onclick="toggleMusic()">♪</button>
    </div>
    <div class="title">闪灵</div>
    <div class="marquee"><span>犯我中华者，虽远必诛！</span></div>
    <div class="time" id="time"></div>
</header>

<div class="top-btns">
    <button class="top-btn" onclick="alert('Cloudflare 登录功能')">☁️ Cloudflare</button>
    <button class="top-btn" onclick="alert('GitHub 登录功能')">🐙 GitHub</button>
    <button class="top-btn" onclick="document.getElementById('iconFile').click()">📷 选择图片</button>
    <input type="file" id="iconFile" accept="image/*" style="display:none" onchange="addBookmark()">
    <button class="top-btn" onclick="addBookmark()">➕ 添加书签</button>
</div>

<div class="bookmarks" id="bookmarks"></div>

<audio id="bgm" loop>
    <source src="https://files.catbox.moe/0oluxu.flac" type="audio/flac">
</audio>

<div class="footer">
    <a href="https://twitter.com/Eternity2099" target="_blank">@Eternity2099</a>
</div>

<script>
let bookmarks = JSON.parse(localStorage.getItem('flashBookmarks')) || [];
let isPlaying = false;
const audio = document.getElementById('bgm');

function toggleMusic() {
    const btn = document.getElementById('musicBtn');
    if (isPlaying) { audio.pause(); btn.textContent = '♪'; }
    else { audio.play().catch(() => {}); btn.textContent = '⏸'; }
    isPlaying = !isPlaying;
}

function renderBookmarks() {
    const container = document.getElementById('bookmarks');
    container.innerHTML = '';
    bookmarks.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div class="icon" style="background-image:url('${item.icon || ''}')"></div>
            <div class="name">${item.name}</div>
            <div class="actions">
                <button onclick="editBookmark(${i});event.stopImmediatePropagation()">✎</button>
                <button onclick="deleteBookmark(${i});event.stopImmediatePropagation()">×</button>
            </div>
        `;
        div.onclick = (e) => {
            if (!e.target.closest('.actions')) window.open(item.url, '_blank');
        };
        container.appendChild(div);
    });
}

async function addBookmark() {
    const name = prompt("请输入书签名称");
    if (!name) return;

    const url = prompt("请输入网址 (https:// 开头)");
    if (!url || !url.startsWith('http')) {
        alert("请输入完整网址");
        return;
    }

    const fileInput = document.getElementById('iconFile');
    let iconData = '';

    if (fileInput.files && fileInput.files[0]) {
        iconData = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.readAsDataURL(fileInput.files[0]);
        });
        fileInput.value = '';
    }

    bookmarks.push({ name, url, icon: iconData });
    localStorage.setItem('flashBookmarks', JSON.stringify(bookmarks));
    renderBookmarks();
}

function editBookmark(i) {
    const item = bookmarks[i];
    const n = prompt('修改名称', item.name);
    if (n === null) return;
    const u = prompt('修改网址', item.url);
    if (u === null) return;
    const ic = prompt('修改图标链接', '');
    bookmarks[i] = { name: n.trim() || item.name, url: u.trim() || item.url, icon: ic.trim() || item.icon };
    localStorage.setItem('flashBookmarks', JSON.stringify(bookmarks));
    renderBookmarks();
}

function deleteBookmark(i) {
    if (confirm('确定删除这个书签吗？')) {
        bookmarks.splice(i, 1);
        localStorage.setItem('flashBookmarks', JSON.stringify(bookmarks));
        renderBookmarks();
    }
}

function updateTime() {
    const d = new Date();
    document.getElementById('time').textContent = `${d.getFullYear()}年 ${d.getMonth()+1}月 ${d.getDate()}日 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}
setInterval(updateTime, 30000);
updateTime();

renderBookmarks();
</script>
</body>
</html>
